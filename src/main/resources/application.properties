# icas-cems 애플리케이션 설정
# 환경별 override: -Dspring.profiles.active=dev|prod 또는 외부 properties

# Database
db.driver=org.postgresql.Driver
db.url=jdbc:postgresql://localhost:5432/icas?currentSchema=com,emp,er,vr,saf,ptl
db.username=icas_admin
db.password=icas1234!
db.pool.max=20
db.pool.min=5

# 파일 업로드
icas.file.root-path=/var/icas/files
icas.file.max-size=52428800
icas.file.allowed-extensions=pdf,jpg,jpeg,png,xlsx,xls,docx,doc,hwp,hwpx,pptx,csv,zip

# 세션
icas.session.timeout-seconds=1800

# 비밀번호 정책
icas.password.min-length=9
icas.password.expire-days=90
icas.password.history-count=3
icas.password.fail-lock-count=5
